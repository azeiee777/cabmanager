name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH Commands to Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd domains/abdulajij.in/public_html/cabmanager
            
            # 1. Force Maintenance Mode to prevent user 500s during update
            php artisan down || true
            
            # 2. Pull latest code
            git pull origin main
            
            # 3. Update dependencies
            composer install --optimize-autoloader --no-dev
            
            # 4. FIX PERMISSIONS (Crucial for Hostinger)
            chmod -R 775 storage bootstrap/cache
            find storage -type d -exec chmod 775 {} \;
            find storage -type f -exec chmod 664 {} \;
            
            # 5. Clear Caches & Old Sessions
            # Removing file sessions prevents 500 errors if you just switched to DB driver
            rm -f storage/framework/sessions/*
            
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan cache:clear
            php artisan optimize:clear
            
            # 6. Run migrations (This creates the 'sessions' table if missing)
            php artisan migrate --force
            
            # 7. Bring App back up
            php artisan up