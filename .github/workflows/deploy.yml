name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  # This line allows you to trigger the deployment manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH Commands to Deploy
        uses: appleboy/ssh-action@master
        with:
          # These MUST be 4 separate secrets in GitHub Settings
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd domains/abdulajij.in/public_html/cabmanager
            
            # Pull latest code from GitHub
            git pull origin main
            
            # Update dependencies
            composer update --optimize-autoloader --no-dev
            
            # Run migrations
            php artisan migrate --force
            
            # Clear and rebuild cache
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache